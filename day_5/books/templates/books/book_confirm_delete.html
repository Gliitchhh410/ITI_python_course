{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete {{ book.title }}</title>
    <link rel="stylesheet" href="{% static 'books/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">📚 ITI Bookstore</div>
        <div class="nav-links">
            <a href="{% url 'book_list' %}" class="btn btn-secondary">Back to List</a>
        </div>
    </header>

    <main class="container container-small">
        <div class="card form-card">
            <h1 class="text-danger">Delete Book</h1>
            <p class="confirm-message">Are you sure you want to permanently delete <strong>"{{ book.title }}"</strong>?</p>
            
            <form method="post" class="delete-form">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    <a href="{% url 'book_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
